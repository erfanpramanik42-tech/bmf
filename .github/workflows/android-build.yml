name: Build Bondhumohol Android APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Init npm & install Capacitor
      run: |
        if [ ! -f package.json ]; then npm init -y; fi
        npm install @capacitor/core @capacitor/cli @capacitor/android @capacitor/filesystem @capacitor/splash-screen

    - name: Create Capacitor config
      run: |
        cat > capacitor.config.json << 'EOF'
        {
          "appId": "com.bondhumohol.foundation",
          "appName": "বন্ধুমহল ফাউন্ডেশন",
          "webDir": "www",
          "server": { "androidScheme": "https" },
          "plugins": {
            "SplashScreen": {
              "launchShowDuration": 2500,
              "backgroundColor": "#1a6b3c",
              "showSpinner": false,
              "splashFullScreen": true,
              "splashImmersive": true,
              "androidSplashResourceName": "splash"
            }
          }
        }
        EOF

    - name: Prepare www folder
      run: |
        mkdir -p www
        cp index.html www/index.html

    - name: Add Android Platform & Sync
      run: |
        npx cap add android || true
        npx cap sync android

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: 'gradle'

    - name: Install imagemagick
      run: sudo apt-get install -y imagemagick

    # ── STEP: আইকন — cap sync এর পরে করতে হবে ────────────
    - name: Generate All Icons
      run: |
        if [ ! -f icon.png ]; then
          echo "⚠️ icon.png নেই — skip"
          exit 0
        fi

        MIPMAP="android/app/src/main/res"

        # ফোল্ডার তৈরি
        mkdir -p $MIPMAP/mipmap-mdpi
        mkdir -p $MIPMAP/mipmap-hdpi
        mkdir -p $MIPMAP/mipmap-xhdpi
        mkdir -p $MIPMAP/mipmap-xxhdpi
        mkdir -p $MIPMAP/mipmap-xxxhdpi
        mkdir -p $MIPMAP/mipmap-anydpi-v26

        # standard launcher icons — ! মানে exact size force করো
        convert icon.png -resize 48x48!   $MIPMAP/mipmap-mdpi/ic_launcher.png
        convert icon.png -resize 48x48!   $MIPMAP/mipmap-mdpi/ic_launcher_round.png
        convert icon.png -resize 72x72!   $MIPMAP/mipmap-hdpi/ic_launcher.png
        convert icon.png -resize 72x72!   $MIPMAP/mipmap-hdpi/ic_launcher_round.png
        convert icon.png -resize 96x96!   $MIPMAP/mipmap-xhdpi/ic_launcher.png
        convert icon.png -resize 96x96!   $MIPMAP/mipmap-xhdpi/ic_launcher_round.png
        convert icon.png -resize 144x144! $MIPMAP/mipmap-xxhdpi/ic_launcher.png
        convert icon.png -resize 144x144! $MIPMAP/mipmap-xxhdpi/ic_launcher_round.png
        convert icon.png -resize 192x192! $MIPMAP/mipmap-xxxhdpi/ic_launcher.png
        convert icon.png -resize 192x192! $MIPMAP/mipmap-xxxhdpi/ic_launcher_round.png

        # adaptive icon foreground (108dp = safe zone সহ)
        convert icon.png -resize 108x108! $MIPMAP/mipmap-mdpi/ic_launcher_foreground.png
        convert icon.png -resize 162x162! $MIPMAP/mipmap-hdpi/ic_launcher_foreground.png
        convert icon.png -resize 216x216! $MIPMAP/mipmap-xhdpi/ic_launcher_foreground.png
        convert icon.png -resize 324x324! $MIPMAP/mipmap-xxhdpi/ic_launcher_foreground.png
        convert icon.png -resize 432x432! $MIPMAP/mipmap-xxxhdpi/ic_launcher_foreground.png

        # adaptive icon background color XML
        mkdir -p $MIPMAP/../values
        cat > $MIPMAP/mipmap-mdpi/ic_launcher_background.png << 'IGNORE'
        IGNORE
        # background color resource
        cat > android/app/src/main/res/values/ic_launcher_background.xml << 'XMLEOF'
        <?xml version="1.0" encoding="utf-8"?>
        <resources>
            <color name="ic_launcher_background">#1a6b3c</color>
        </resources>
        XMLEOF

        # adaptive icon XML (anydpi-v26)
        cat > $MIPMAP/mipmap-anydpi-v26/ic_launcher.xml << 'XMLEOF'
        <?xml version="1.0" encoding="utf-8"?>
        <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
            <background android:drawable="@color/ic_launcher_background"/>
            <foreground android:drawable="@mipmap/ic_launcher_foreground"/>
        </adaptive-icon>
        XMLEOF

        cat > $MIPMAP/mipmap-anydpi-v26/ic_launcher_round.xml << 'XMLEOF'
        <?xml version="1.0" encoding="utf-8"?>
        <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
            <background android:drawable="@color/ic_launcher_background"/>
            <foreground android:drawable="@mipmap/ic_launcher_foreground"/>
        </adaptive-icon>
        XMLEOF

        echo "✅ সব আইকন তৈরি হয়েছে"
        ls -la $MIPMAP/mipmap-xxhdpi/

    # ── STEP: Splash Screen ────────────────────────────────
    - name: Generate Splash Screen
      run: |
        if [ ! -f icon.png ]; then
          echo "⚠️ icon.png নেই — skip"
          exit 0
        fi

        DRAWABLE="android/app/src/main/res"
        mkdir -p $DRAWABLE/drawable
        mkdir -p $DRAWABLE/drawable-land
        mkdir -p $DRAWABLE/drawable-port
        mkdir -p $DRAWABLE/drawable-night
        mkdir -p $DRAWABLE/drawable-v21

        # portrait splash — সবুজ bg + center icon
        convert -size 1080x1920 xc:"#1a6b3c" \
          \( icon.png -resize 350x350 \) \
          -gravity center -composite \
          -type TrueColor \
          $DRAWABLE/drawable/splash.png

        # landscape
        convert -size 1920x1080 xc:"#1a6b3c" \
          \( icon.png -resize 280x280 \) \
          -gravity center -composite \
          -type TrueColor \
          $DRAWABLE/drawable-land/splash.png

        # portrait copy
        cp $DRAWABLE/drawable/splash.png $DRAWABLE/drawable-port/splash.png

        # dark mode same (সবুজ ব্যাকগ্রাউন্ড)
        cp $DRAWABLE/drawable/splash.png $DRAWABLE/drawable-night/splash.png
        cp $DRAWABLE/drawable/splash.png $DRAWABLE/drawable-v21/splash.png

        echo "✅ Splash screen তৈরি হয়েছে"
        identify $DRAWABLE/drawable/splash.png

    # ── STEP: Java Download Bridge ─────────────────────────
    - name: Inject Java Download Bridge
      run: |
        JAVA_DIR="android/app/src/main/java/com/bondhumohol/foundation"
        mkdir -p $JAVA_DIR

        cat > $JAVA_DIR/DownloadPlugin.java << 'JAVAEOF'
        package com.bondhumohol.foundation;
        import android.os.Environment;
        import com.getcapacitor.JSObject;
        import com.getcapacitor.Plugin;
        import com.getcapacitor.PluginCall;
        import com.getcapacitor.PluginMethod;
        import com.getcapacitor.annotation.CapacitorPlugin;
        import java.io.File;
        import java.io.FileWriter;

        @CapacitorPlugin(name = "DownloadPlugin")
        public class DownloadPlugin extends Plugin {
            @PluginMethod
            public void saveFile(PluginCall call) {
                String content  = call.getString("content", "");
                String fileName = call.getString("fileName", "backup.json");
                try {
                    File dir = Environment.getExternalStoragePublicDirectory(Environment.DIRECTORY_DOWNLOADS);
                    if (!dir.exists()) dir.mkdirs();
                    File out = new File(dir, fileName);
                    FileWriter fw = new FileWriter(out);
                    fw.write(content);
                    fw.flush();
                    fw.close();
                    JSObject res = new JSObject();
                    res.put("success", true);
                    res.put("path", out.getAbsolutePath());
                    call.resolve(res);
                } catch (Exception e) {
                    call.reject(e.getMessage());
                }
            }
        }
        JAVAEOF

        cat > $JAVA_DIR/MainActivity.java << 'MAINEOF'
        package com.bondhumohol.foundation;
        import com.getcapacitor.BridgeActivity;
        import android.os.Bundle;
        public class MainActivity extends BridgeActivity {
            @Override
            public void onCreate(Bundle savedInstanceState) {
                registerPlugin(DownloadPlugin.class);
                super.onCreate(savedInstanceState);
            }
        }
        MAINEOF
        echo "✅ Java bridge তৈরি হয়েছে"

    - name: Set App Name
      run: |
        STRINGS="android/app/src/main/res/values/strings.xml"
        sed -i 's/<string name="app_name">.*<\/string>/<string name="app_name">বন্ধুমহল ফাউন্ডেশন<\/string>/' $STRINGS

    - name: Inject Permissions
      run: |
        MANIFEST="android/app/src/main/AndroidManifest.xml"
        sed -i 's/<application/<application android:requestLegacyExternalStorage="true"/' $MANIFEST
        sed -i 's/<\/manifest>/    <uses-permission android:name="android.permission.INTERNET" \/>\n<\/manifest>/' $MANIFEST
        sed -i 's/<\/manifest>/    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" android:maxSdkVersion="32" \/>\n<\/manifest>/' $MANIFEST
        sed -i 's/<\/manifest>/    <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" android:maxSdkVersion="29" \/>\n<\/manifest>/' $MANIFEST
        sed -i 's/<\/manifest>/    <uses-permission android:name="android.permission.CAMERA" \/>\n<\/manifest>/' $MANIFEST
        sed -i 's/<\/manifest>/    <uses-feature android:name="android.hardware.camera" android:required="false" \/>\n<\/manifest>/' $MANIFEST

    - name: Build Debug APK
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleDebug --stacktrace

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: bondhumohol-debug-apk
        path: android/app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30
